<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Translation Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Animated Gradient Background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Container */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 700px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            color: #1e293b;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        /* Controls / Dropdowns */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 16px;
        }

        .controls span {
            font-weight: 500;
            color: #64748b;
        }

        select {
            flex: 1;
            cursor: pointer;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: #334155;
            background-color: #fff;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2364748b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Text Areas and Headers */
        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .input-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 500;
            color: #475569;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 25px;
            outline: none;
            transition: all 0.3s ease;
            background-color: #fcfcfc;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.1);
        }

        /* Buttons */
        button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .btn-mic {
            background-color: #f1f5f9;
            color: #334155;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .btn-mic:hover {
            background-color: #e2e8f0;
            transform: translateY(-1px);
        }

        .btn-mic.listening {
            background-color: #ef4444;
            color: white;
            border-color: #dc2626;
            animation: pulse-red 1.5s infinite;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-secondary {
            background-color: #f8fafc;
            color: #475569;
            border: 2px solid #e2e8f0;
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
            color: #0f172a;
            transform: translateY(-2px);
        }

        /* Animations and states */
        .loading {
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            color: #3b82f6;
            display: none;
            margin-bottom: 20px;
            animation: pulse-opacity 1s infinite alternate;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        @keyframes pulse-opacity {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        /* Mobile adjustments */
        @media (max-width: 600px) {
            .container { padding: 25px; }
            .controls { flex-direction: column; }
            .controls span { display: none; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ Global Translator</h2>
    
    <div class="controls">
        <select id="sourceLang">
            <option value="en">🇺🇸 English</option>
            <option value="es">🇪🇸 Spanish</option>
            <option value="fr">🇫🇷 French</option>
            <option value="de">🇩🇪 German</option>
            <option value="hi">🇮🇳 Hindi</option>
            <option value="zh">🇨🇳 Chinese</option>
        </select>
        <span>➔</span>
        <select id="targetLang">
            <option value="es">🇪🇸 Spanish</option>
            <option value="en">🇺🇸 English</option>
            <option value="fr">🇫🇷 French</option>
            <option value="de">🇩🇪 German</option>
            <option value="hi">🇮🇳 Hindi</option>
            <option value="zh">🇨🇳 Chinese</option>
        </select>
    </div>

    <div class="input-header">
        <h3>Original Text</h3>
        <button id="micBtn" class="btn-mic" onclick="startListening()">🎤 Voice Input</button>
    </div>
    <textarea id="inputText" placeholder="Type here, or click 'Voice Input' to speak..."></textarea>
    
    <button class="btn-primary" onclick="translateText()">Translate Now</button>
    
    <div id="loadingIndicator" class="loading">Translating your text...</div>

    <div class="input-header" style="margin-top: 10px;">
        <h3>Translation</h3>
    </div>
    <textarea id="outputText" readonly placeholder="Your translation will appear here..."></textarea>

    <div class="action-buttons">
        <button class="btn-secondary" onclick="copyText()">📋 Copy Text</button>
        <button class="btn-secondary" onclick="speakText()">🔊 Listen</button>
    </div>
</div>

<script>
    // --- 1. Speech to Text (Voice Input) ---
    function startListening() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("Your browser does not support Voice Input. Please try Google Chrome or Edge.");
            return;
        }

        const recognition = new SpeechRecognition();
        const sourceLang = document.getElementById('sourceLang').value;
        const micBtn = document.getElementById('micBtn');
        const inputBox = document.getElementById('inputText');
        
        const langMap = {
            'en': 'en-US',
            'es': 'es-ES',
            'fr': 'fr-FR',
            'de': 'de-DE',
            'hi': 'hi-IN',
            'zh': 'zh-CN'
        };
        
        recognition.lang = langMap[sourceLang] || 'en-US';
        recognition.interimResults = false; 
        recognition.maxAlternatives = 1;

        recognition.onstart = function() {
            micBtn.innerText = "🛑 Listening...";
            micBtn.classList.add('listening');
            inputBox.placeholder = "Listening... Speak now.";
        };

        recognition.onspeechend = function() {
            recognition.stop();
        };

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            if(inputBox.value.trim() !== '') {
                inputBox.value += ' ' + transcript;
            } else {
                inputBox.value = transcript;
            }
            resetMicButton();
        };

        recognition.onerror = function(event) {
            console.error("Speech Recognition Error:", event.error);
            resetMicButton();
            if (event.error === 'not-allowed') {
                alert("Microphone access was denied. Ensure you are running this on a server (localhost) or HTTPS, and check browser permissions.");
            } else if (event.error !== 'no-speech') {
                alert("Error recognizing speech: " + event.error);
            }
        };

        function resetMicButton() {
            micBtn.innerText = "🎤 Voice Input";
            micBtn.classList.remove('listening');
            inputBox.placeholder = "Type here, or click 'Voice Input' to speak...";
        }

        recognition.start();
    }

    // --- 2. Translation Logic ---
    async function translateText() {
        const text = document.getElementById('inputText').value.trim();
        const sourceLang = document.getElementById('sourceLang').value;
        const targetLang = document.getElementById('targetLang').value;
        const outputBox = document.getElementById('outputText');
        const loading = document.getElementById('loadingIndicator');

        if (!text) {
            alert("Please enter some text to translate.");
            return;
        }

        if (sourceLang === targetLang) {
            outputBox.value = text;
            return;
        }

        loading.style.display = 'block';
        outputBox.value = '';

        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.responseData && data.responseData.translatedText) {
                outputBox.value = data.responseData.translatedText;
            } else {
                outputBox.value = "Error: Could not fetch translation.";
            }
        } catch (error) {
            console.error("Translation API Error:", error);
            outputBox.value = "An error occurred while connecting to the translation service.";
        } finally {
            loading.style.display = 'none';
        }
    }

    // --- 3. Copy to Clipboard ---
    function copyText() {
        const outputText = document.getElementById('outputText');
        if (!outputText.value) {
            alert("Nothing to copy!");
            return;
        }
        
        navigator.clipboard.writeText(outputText.value).then(() => {
            alert("✨ Text copied to clipboard!");
        }).catch(err => {
            console.error('Failed to copy text: ', err);
        });
    }

    // --- 4. Text to Speech (Listen) ---
    function speakText() {
        const textToSpeak = document.getElementById('outputText').value;
        const targetLang = document.getElementById('targetLang').value;

        if (!textToSpeak) {
            alert("Nothing to read aloud! Please translate something first.");
            return;
        }

        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        
        const langMap = {
            'en': 'en-US',
            'es': 'es-ES',
            'fr': 'fr-FR',
            'de': 'de-DE',
            'hi': 'hi-IN',
            'zh': 'zh-CN'
        };
        
        const targetBcp47 = langMap[targetLang] || 'en-US';
        utterance.lang = targetBcp47;

        const voices = window.speechSynthesis.getVoices();
        const matchedVoice = voices.find(voice => voice.lang === targetBcp47 || voice.lang.startsWith(targetLang));
        
        if (matchedVoice) {
            utterance.voice = matchedVoice;
        }

        utterance.onerror = function(event) {
            console.error("SpeechSynthesis Error:", event.error);
            if (event.error === 'not-allowed') {
                alert("Audio blocked by your browser. Ensure you are clicking the button directly.");
            }
        };

        window.speechSynthesis.speak(utterance);
    }
    
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
</script>

</body>
</html>
